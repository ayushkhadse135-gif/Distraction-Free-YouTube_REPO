<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframes</title>
</head>

<body>
    <h1>this is an Iframe example. </h1>

    <br><br>

    <iframe src="https://codewithharry.com" width="490" height="500" frameborder="0"></iframe>



    <iframe src="https://wikipedia.com" width="490" height="500" frameborder="0"></iframe>

    <iframe src="https://chrome.com" width="490" height="500" frameborder="0"></iframe>

    <br><br>

    <h1>This example of embed from youtube.</h1>

    <br><br>

    <iframe width="490" height="300" src="https://www.youtube.com/embed/JFtlf8RoPZY?si=cB2kf2HUQ6VKPMKs"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>



    <iframe width="490" height="300" src="https://www.youtube.com/embed/AFchYCwm2-g?si=sAVdtuKrSa0Uld1x"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>


    <iframe width="490" height="300" src="https://www.youtube.com/embed/HnujzWGFThI?si=QRZo56Uu84Njy5NI"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>

</html>
