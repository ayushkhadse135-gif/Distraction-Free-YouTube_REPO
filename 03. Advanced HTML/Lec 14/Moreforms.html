<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>More Forms</title>
</head>
<body>
    
    <form action="/process1.php">       

        <!-- input box  -->

        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter Your Name">

        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter Your email">

        <br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter Your password">

        <br><br>

        <!-- radio buttons -->

        <p>Choose Your Gender</p>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender"  value="female">
        <label for="female">Female</label>

        <br><br>

        <!-- check boxes -->

        <p>Choose Your Hobby</p>

        <input type="checkbox" id="reading" name="hobby" value="reading">
        <label for="reading">Reading</label>

        <br><br>


        <input type="checkbox" id="playing" name="hobby" value="playing">
        <label for="playing">Playing</label>

        <br><br>

        <input type="checkbox"  id="swimming" name="hobby" value="swimming">
        <label for="swimming">Swimming</label>

        <br><br>

        <!-- Dropdown List -->

        <label for="city">Choose Your City : </label>
        <select name="city" id="city">
            <option value="delhi">Delhi</option>
            <option value="mumbai">Mumbai</option>
            <option value="jalna">Jalna</option>
        </select>

        <br><br>

        <label for="message">Enter Your Message : </label>
        <textarea name="message" id="message"></textarea>

        <input type="submit" value="Submit">
        

    </form>

</body>
</html>
