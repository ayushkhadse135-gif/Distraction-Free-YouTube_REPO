<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sementic</title>
</head>

<body>
    <!-- Block Elements : Starts on new line-->
    <div>
        <p>Hey</p>
        <p>I am a boy.</p>
    </div>
    
    <!-- Inline Elements : do not start on new line-->

    <span>
        <p>Hey</p>
        <p>I am a boy.</p>
    </span>

    <!-- Sementic tags -->

    <header>
        <h1>This is sementic tags header</h1>
    </header>

    <nav>
        <a href="#">Home</a> |
        <a href="#">About</a> |
        <a href="#">Contact</a>
    </nav>

    <main>
        <section>
            <h2>Welcome</h2>
            <p>This is the Welcome section</p>
        </section>

        <article>
            <h2>Bolg post</h2>
            <p>This is Blog post inside  article tag</p>
        </article>
    </main>

    <aside>
        <p>This is sidebar with related links.</p>
    </aside>

    <footer>
        <p>Copyright @ 2026</p>
    </footer>

</body>

</html>
