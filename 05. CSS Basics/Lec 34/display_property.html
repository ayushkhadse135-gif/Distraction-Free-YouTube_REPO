<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispaly Property</title>

    <style>

        *{
            margin: 0;
            padding: 0;
        }
        div{
            border: 3px solid green;
            background-color: pink;
            display: inline;    /*div is a by default block type we changed it to inline */
        }

        span{
            border: 3px solid red;
            background-color: aqua;
            /* display: none; */    
            display: block;    /*span is a by default inline type we changed it to block type */

        }
    </style>
</head>
<body>
    <div>This is div1</div>
    <span>this is span1</span>
    <span>this is span2</span>

</body>
</html>
