<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <h1>Tables</h1>
    <table border="1">
        <tr>
            <th>Sr.no</th>
            <th>Name</th>
            <th>Marks</th>
        </tr>

        <tr>
            <td>1</td>
            <td>Aditya</td>
            <td>90</td>
        </tr>

        <tr>
            <td>2</td>
            <td>Ayush</td>
            <td>92</td>
        </tr>

        <tr>
            <td>3</td>
            <td>Shivam</td>
            <td>95</td>
        </tr>

        <!--  Merging two rows -->
        <tr>
            <td rowspan="2">4</td>
            <td>Shivansh</td>
            <td>35</td>
        </tr>
        <tr>
            <td>Shivansh</td>
            <td>94</td>
        </tr>

        <!--  Merging two columns -->
        <tr>
            <td colspan="2">Ram</td>
            <td>80</td>
        </tr>
    </table>
</body>
</html>
